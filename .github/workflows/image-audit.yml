name: image-audit
# Audit visuel des images villes : télécharge chaque image distincte
# (scripts/image-audit-list.json) et fabrique des planches-contact numérotées,
# committées sur la branche image-audit pour revue (conformité : pas de
# personnes/visages, pas d'alcool, pas de lieux de culte non-islamiques).

on: workflow_dispatch

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download thumbnails + build contact sheets
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick
          mkdir -p audit/thumbs
          python3 - << 'PY'
          import json, urllib.request, os
          items = json.load(open('scripts/image-audit-list.json'))
          for i, it in enumerate(items):
              url = f"https://images.unsplash.com/photo-{it['id']}?w=220&h=165&fit=crop&q=60"
              dest = f"audit/thumbs/{i:03d}.jpg"
              try:
                  urllib.request.urlretrieve(url, dest)
              except Exception as e:
                  print('FAIL', i, it['id'], e)
          json.dump(items, open('audit/map.json', 'w'), indent=1)
          PY
          # Planches numérotées : index en légende sous chaque vignette
          cd audit/thumbs
          for f in *.jpg; do
            n="${f%.jpg}"
            convert "$f" -gravity South -background white -splice 0x22 -pointsize 16 -annotate +0+2 "$n" "../lbl-$f" || true
          done
          cd ..
          montage lbl-*.jpg -tile 6x -geometry +4+4 -background white sheet.jpg
          convert sheet.jpg -crop 100%x25% +repage sheet-%d.jpg || true
      - name: Commit results to image-audit branch
        run: |
          git config user.name "image-audit"
          git config user.email "noreply@github.com"
          git checkout -B image-audit
          git add -f audit
          git commit -m "Planches-contact des 94 images villes (revue conformité)"
          git push -f origin image-audit
