name: hb-verify
# Vérification RÉELLE des resorts HalalBooking : télécharge les fiches
# candidates et extrait les mentions « ladies only / women only pool/beach »
# comme PREUVE avant tout import. Résultats committés sur la branche hb-audit.
on: workflow_dispatch
permissions:
  contents: write
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch candidate pages and extract evidence
        run: |
          mkdir -p hb-audit
          python3 - << 'PY'
          import urllib.request, re, json, gzip, io
          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
          def get(u, timeout=30):
              req = urllib.request.Request(u, headers=UA)
              data = urllib.request.urlopen(req, timeout=timeout).read()
              if u.endswith('.gz'):
                  data = gzip.decompress(data)
              return data.decode('utf-8', 'ignore')
          # 1) Découverte des sitemaps réels
          hotel_urls = []
          try:
              robots = get('https://en.halalbooking.com/robots.txt')
              maps = re.findall(r'Sitemap:\s*(\S+)', robots)
              print('sitemaps robots:', maps)
              queue = list(maps) or ['https://en.halalbooking.com/sitemap.xml']
              seen = set()
              while queue and len(hotel_urls) < 20000:
                  sm = queue.pop(0)
                  if sm in seen: continue
                  seen.add(sm)
                  try: xml = get(sm)
                  except Exception as e: print('sitemap KO', sm, e); continue
                  locs = re.findall(r'<loc>([^<]+)</loc>', xml)
                  for l in locs:
                      if re.search(r'sitemap[^<]*\.xml', l) and l not in seen and len(seen) < 30:
                          queue.append(l)
                      elif '/hotel' in l or '/en/' in l:
                          hotel_urls.append(l)
              print('urls hôtels découvertes:', len(hotel_urls))
          except Exception as e:
              print('robots KO:', e)
          def norm(s): return re.sub(r'[^a-z0-9]+', '', s.lower())
          CANDIDATES = [
            ("antalya", "Adin Beach Hotel", "adinbeach"),
            ("antalya", "Adenya Hotel", "adenya"),
            ("antalya", "Wome Deluxe", "womedeluxe"),
            ("antalya", "Bera Alanya", "beraalanya"),
            ("antalya", "Selge Beach", "selgebeach"),
            ("antalya", "Sah Inn Paradise", "sahinn"),
            ("marmaris", "Angel's Marmaris", "angelsmarmaris"),
            ("bodrum", "Rizom Beach", "rizom"),
          ]
          MARKERS = re.compile(r"ladies[- ]only|women[- ]only|female[- ]only|ladies beach|ladies pool|privacy for ladies", re.I)
          out = []
          for slug, nom, key in CANDIDATES:
              rec = {"villeSlug": slug, "nom": nom, "fetched": False, "evidence": []}
              matches = [u for u in hotel_urls if key in norm(u)]
              rec["matchedUrls"] = matches[:3]
              for u in matches[:2]:
                  try:
                      html = get(u)
                      rec["fetched"] = True; rec["url"] = u
                      hits = set()
                      for m in MARKERS.finditer(html):
                          a = max(0, m.start()-70); b = min(len(html), m.end()+70)
                          frag = re.sub(r'<[^>]+>', ' ', html[a:b]); frag = re.sub(r'\s+', ' ', frag).strip()
                          hits.add(frag[:150])
                      rec["evidence"] = sorted(hits)[:8]
                      if rec["evidence"]: break
                  except Exception as e:
                      rec.setdefault("errors", []).append(f"{u}: {e}")
              out.append(rec)
              print(nom, '| urls:', len(matches), '| fetched:', rec['fetched'], '| preuves:', len(rec['evidence']))
          json.dump(out, open('hb-audit/evidence.json', 'w'), ensure_ascii=False, indent=1)
          # 2) DÉCOUVERTE : scan d'un échantillon de fiches du sitemap pour
          # trouver des resorts « ladies-only » inconnus (preuves extraites,
          # tri humain ensuite). Ville devinée depuis le titre/fil d'Ariane.
          import random
          random.seed(42)
          pool = [u for u in hotel_urls if '/hotel' in u]
          sample = random.sample(pool, min(220, len(pool)))
          NEG = re.compile(r'No pool, spa or beach for ladies', re.I)
          disc = []
          for u in sample:
              try:
                  html = get(u)
              except Exception:
                  continue
              # retirer footer + blocs de suggestion (présents sur TOUTES les pages)
              body = re.sub(r'<footer[\s\S]*?</footer>', ' ', html)
              body = re.sub(r'<[^>]*(?:footer-nav|search-ideas)[^>]*>[\s\S]{0,4000}?</(?:div|section|ul)>', ' ', body)
              if NEG.search(body):
                  continue  # l'hôtel dit explicitement NE PAS avoir d'espace femmes
              # SIGNAL FIABLE : les codes d'équipement dans l'état sérialisé de la
              # page (« pool-ladies-only », « Beach • ladies-only »…) — le glossaire
              # générique (« Only female guests… ») est ignoré.
              feats = set()
              for m in re.finditer(r'(?:Pool|Beach|Spa|Wellness[ &]*Spa)[^"\]]{0,60}ladies-only[^"\]]{0,40}', body, re.I):
                  feats.add(re.sub(r'\s+', ' ', m.group(0)).strip()[:120])
              for m in re.finditer(r'"(?:pool|beach|spa|wellness)-ladies[a-z-]*"', body, re.I):
                  feats.add(m.group(0).strip('"'))
              if not feats:
                  continue
              t = re.search(r'<title>([^<]+)</title>', html)
              disc.append({"url": u, "title": (t.group(1).strip() if t else ''), "evidence": sorted(feats)[:8]})
              print('DISC', u, '|', len(feats))
          json.dump(disc, open('hb-audit/discovery.json', 'w'), ensure_ascii=False, indent=1)
          print('découvertes avec preuves positives:', len(disc))
          PY
      - name: Commit evidence
        run: |
          git config user.name "hb-verify"
          git config user.email "noreply@github.com"
          git checkout -B hb-audit
          git add -f hb-audit
          git commit -m "Preuves HalalBooking (extraits ladies-only) pour import vérifié"
          git push -f origin hb-audit
