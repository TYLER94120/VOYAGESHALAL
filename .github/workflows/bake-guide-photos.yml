name: bake-guide-photos
# Auto-héberge les photos retenues des parcours 3 jours (public/guides/)
# et bascule data/guideImages.json vers les chemins locaux. Manuel.

on: workflow_dispatch

permissions:
  contents: write

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download selected photos
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick
          node scripts/bake-guide-photos.mjs
          # Paysage net et léger : largeur 900px, qualité 78
          for f in public/guides/*.jpg; do
            mogrify -resize '900x>' -quality 78 -strip "$f" || true
          done
          du -sh public/guides
      - name: Commit
        run: |
          git config user.name "guide-photos-bot"
          git config user.email "actions@github.com"
          git add public/guides data/guideImages.json
          git diff --cached --quiet && echo "rien à committer" && exit 0
          git commit -m "Photos parcours 3 jours auto-hébergées (Wikimedia, crédits conservés)"
          git pull --rebase origin main
          git push origin main
